# /etc/apache2/conf-available/php84-poprua-cras.conf
#
# Apache vhost para PopRua CRAS no host vlcp-sufis01.
# Faz proxy FastCGI para o container php84-poprua-cras (porta 9086).
#
# Instalacao:
#   sudo cp this-file /etc/apache2/conf-available/php84-poprua-cras.conf
#   sudo a2enconf php84-poprua-cras
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
#
# URL resultante: https://sufis.pbh.gov.br/ginfi/poprua-cras/public

<Directory "/var/www/html/joomla_sufis/ginfi/poprua-cras/public">
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://127.0.0.1:9086"
    </FilesMatch>
    RequestHeader set X-Forwarded-Proto "https"
    AllowOverride All
    Options FollowSymLinks
    Require all granted
</Directory>
