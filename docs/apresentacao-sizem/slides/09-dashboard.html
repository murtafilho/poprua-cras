<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
</head>
<body>

<div class="slide">
<header class="masthead">
  <div class="masthead-brand"><img src="../../public/images/brand/v2/sizem-icon-a2-transparent.svg" alt=""> SIZEM</div>
  <div class="masthead-topic">Gestão</div>
</header>
<div class="slide-body"><div class="split flip">
  <div class="col-text">
    <div class="kicker"><span>Indicadores estratégicos</span></div>
    <h1 class="title">Dashboard de gestão</h1>
    <p class="lead">Visão gerencial do fenômeno, complementando o mapa operacional.</p>
    <div class="kpi-row">
      <div class="kpi"><div class="v">—</div><div class="l">Pontos</div></div>
      <div class="kpi"><div class="v">—</div><div class="l">Vistoriados</div></div>
      <div class="kpi"><div class="v">—</div><div class="l">Zeladorias</div></div>
    </div>
    <ul class="features">
      <li>Evolução mensal por resultado da última zeladoria</li>
      <li>Filtros: Ativos, Persiste, Extinto, Conformidade</li>
    </ul>
  </div>
  <div class="col-visual"><div class="screen">
  <div class="screen-bar">/dashboard</div>
  <img src="../../homologacao/img/09-dashboard.png" alt="">
</div></div>
</div></div></div>
</body></html>
