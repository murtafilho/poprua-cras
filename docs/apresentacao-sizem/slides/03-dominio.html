<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Domínio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
</head>
<body>

<div class="slide">
<header class="masthead">
  <div class="masthead-brand"><img src="../../public/images/brand/v2/sizem-icon-a2-transparent.svg" alt=""> SIZEM</div>

</header>
<div class="slide-body">

  </div>
  <div class="gallery">
    <div class="gallery-tile"><img src="../../homologacao/img/07-pontos.png" alt=""><span>Pontos</span></div>
    <div class="gallery-tile"><img src="../../homologacao/img/03-vistorias.png" alt=""><span>Zeladorias</span></div>
    <div class="gallery-tile"><img src="../../homologacao/img/06-moradores.png" alt=""><span>Moradores</span></div>
  </div>
</div></div>
