# Deploy automatico em producao apos push em main.
# Requer self-hosted runner no vlcp-sufis01 (ver docker/install-github-runner.sh).
#
# Alternativa sem runner: docker/install-auto-deploy-cron.sh (poll a cada 3 min).

name: Deploy production

on:
  push:
    branches: [main]

concurrency:
  group: poprua-cras-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, poprua-cras]
    timeout-minutes: 30
    steps:
      - name: Deploy via deploy.sh
        run: sudo bash /var/www/html/joomla_sufis/ginfi/poprua-cras/docker/deploy.sh
